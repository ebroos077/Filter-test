<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>House Filter</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Georgia, serif; background: #f5f5f5; padding: 2rem; color: #333; }
  h1 { font-family: Georgia, serif; font-size: 30px; font-weight: 500; margin-bottom: 1.5rem; }
  .filters { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 1.5rem; align-items: flex-end; }
  .filter-group { display: flex; flex-direction: column; gap: 6px; }
  .filter-group label { font-family: Georgia, serif; font-size: 12px; color: #666; }
  select, input[type="text"] { font-family: Arial, sans-serif; padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; background: #fff; cursor: pointer; }
  input[type="text"] { width: 250px; cursor: text; }
  input[type="text"]:focus, select:focus { outline: none; border-color: #aaa; }
  .count { font-family: Georgia, serif; font-size: 15px; color: #666; margin-bottom: 1rem; }
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }

  .card {
    background: #fff;
    border: 2px solid transparent;
    border-radius: 12px;
    padding: 1rem 1.25rem;
    position: relative;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    display: block;
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
  }

  .card:hover {
    border-color: #378ADD;
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
  }

  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .card-addr { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; }
  .card-city { font-family: Arial, sans-serif; font-size: 12px; color: #666; margin-top: 2px; }
  .badge { font-family: Arial, sans-serif; font-size: 11px; padding: 3px 8px; border-radius: 8px; white-space: nowrap; display: inline-block; margin-bottom: 8px; margin-right: 4px; }
  .badge-conv { background: #E6F1FB; color: #0C447C; }
  .badge-fha { background: #EAF3DE; color: #27500A; }
  .badge-va { background: #EEEDFE; color: #3C3489; }
  .badge-hard { background: #FAEEDA; color: #633806; }
  .badge-Construct { background: #FFF4E5; color: #7A4F01; }
  .badge-commercial { background: #E5F9F6; color: #1B5E3C; }
  .badge-brokered { background: #F0E6FF; color: #4B2E83; }
  .badge-funded { background: #E6F9F0; color: #2E7D3C; }
  .badge-refi { background: #FAECE7; color: #712B13; }
  .card-row { display: flex; justify-content: space-between; font-family: Arial, sans-serif; font-size: 13px; margin-top: 6px; }
  .card-row span:first-child { color: #666; }
  .card-row span:last-child { font-weight: 500; }
  .no-results { font-family: Georgia, serif; text-align: center; padding: 2rem; color: #666; font-size: 14px; grid-column: 1/-1; }

  .load-more-wrap { text-align: center; margin-top: 1.5rem; }
  .load-more-btn {
    font-family: Georgia, serif;
    padding: 10px 32px;
    font-size: 14px;
    border: 1px solid #ddd;
    border-radius: 8px;
    background: #fff;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
  }
  .load-more-btn:hover { background: #f0f0f0; border-color: #bbb; }
  .load-more-btn:disabled { opacity: 0.4; cursor: default; }
</style>
</head>
<body>

<h1>Property listings</h1>

<div class="filters">
  <div class="filter-group">
    <label>Search</label>
    <input type="text" id="search" oninput="filter()" placeholder="Search address or city...">
  </div>
  <div class="filter-group">
    <label>Brokered or funded</label>
    <select id="type-filter" onchange="filter()">
      <option value="all">All</option>
      <option value="Brokered Loan">Brokered Loan</option>
      <option value="Funded Loan">Funded Loan</option>
    </select>
  </div>
  <div class="filter-group">
    <label>Loan type</label>
    <select id="loan-filter" onchange="filter()">
      <option value="all">All types</option>
      <option value="Conventional">Conventional</option>
      <option value="FHA">FHA</option>
      <option value="VA">VA</option>
      <option value="Hard Money">Hard Money</option>
      <option value="Construction">Construction</option>
      <option value="Commercial">Commercial</option>
    </select>
  </div>
  <div class="filter-group">
    <label>Refinance</label>
    <select id="refi-filter" onchange="filter()">
      <option value="all">All</option>
      <option value="yes">Refinance only</option>
      <option value="no">Purchase only</option>
    </select>
  </div>
  <div class="filter-group">
    <label>Sort by</label>
    <select id="sort-filter" onchange="filter()">
      <option value="price-asc">Price: low to high</option>
      <option value="price-desc">Price: high to low</option>
      <option value="rate-asc">Rate: low to high</option>
      <option value="rate-desc">Rate: high to low</option>
    </select>
  </div>
</div>

<div class="count" id="count"></div>
<div class="cards" id="cards"></div>
<div class="load-more-wrap">
  <button class="load-more-btn" id="load-more-btn" onclick="loadMore()">Load more</button>
</div>

const badgeClass = {
  Conventional: "badge-conv",
  FHA: "badge-fha",
  VA: "badge-va",
  "Hard Money": "badge-hard",
    Construction: "badge-Construct",
    Commercial: "badge-commercial",
};

const typeClass = {
  "Brokered Loan": "badge-brokered",
  "Funded Loan": "badge-funded",
};

const PAGE_SIZE = 8;
let currentPage = 1;
let filteredList = [];

function filter() {
  const lt = document.getElementById("loan-filter").value;
  const tp = document.getElementById("type-filter").value;
  const rf = document.getElementById("refi-filter").value;
  const st = document.getElementById("sort-filter").value;
  const search = document.getElementById("search").value.toLowerCase();

  filteredList = houses.filter(h => {
    if (lt !== "all" && h.loan !== lt) return false;
    if (tp !== "all" && h.type !== tp) return false;
    if (rf === "yes" && !h.refi) return false;
    if (rf === "no" && h.refi) return false;
    if (search && !h.addr.toLowerCase().includes(search) && !h.city.toLowerCase().includes(search)) return false;
    return true;
  });

  if (st === "price-asc") filteredList.sort((a, b) => a.price - b.price);
  else if (st === "price-desc") filteredList.sort((a, b) => b.price - a.price);
  else if (st === "rate-asc") filteredList.sort((a, b) => a.rate - b.rate);
  else if (st === "rate-desc") filteredList.sort((a, b) => b.rate - a.rate);

  currentPage = 1;
  renderCards();
}

function renderCards() {
  const container = document.getElementById("cards");
  const btn = document.getElementById("load-more-btn");
  const visible = filteredList.slice(0, currentPage * PAGE_SIZE);

  document.getElementById("count").textContent = `Showing ${visible.length} of ${filteredList.length} propert${filteredList.length === 1 ? "y" : "ies"}`;

  if (!filteredList.length) {
    container.innerHTML = '<div class="no-results">No properties match your filters</div>';
    btn.style.display = "none";
    return;
  }

  container.innerHTML = visible.map(h => `
    <a href="${h.link}" target="_blank" class="card">
      <div class="card-header">
        <div>
          <div class="card-addr">${h.addr}</div>
          <div class="card-city">${h.city}</div>
        </div>
        ${h.refi ? '<span class="badge badge-refi">Refi</span>' : ''}
      </div>
      <span class="badge ${badgeClass[h.loan]}">${h.loan}</span>
      <span class="badge ${typeClass[h.type]}">${h.type}</span>
      <div class="card-row"><span>Price</span><span>$${h.price.toLocaleString()}</span></div>
      <div class="card-row"><span>Rate</span><span>${h.rate.toFixed(2)}%</span></div>
      <div class="card-row"><span>Sq ft</span><span>${h.sqft.toLocaleString()}</span></div>
    </a>
  `).join("");

  btn.style.display = visible.length >= filteredList.length ? "none" : "inline-block";
}

function loadMore() {
  currentPage++;
  renderCards();
}

filter();
</script>
